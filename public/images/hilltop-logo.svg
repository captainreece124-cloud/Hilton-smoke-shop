<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle - burgundy -->
  <circle cx="100" cy="100" r="95" fill="#6b4a4a" stroke="#d9c9c0" stroke-width="3"/>
  
  <!-- Inner cream circle -->
  <circle cx="100" cy="100" r="85" fill="#f5f0ea"/>
  
  <!-- Decorative arcs - burgundy -->
  <path d="M 40 60 Q 50 50, 65 55" fill="none" stroke="#6b4a4a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 135 55 Q 150 50, 160 60" fill="none" stroke="#6b4a4a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 40 140 Q 50 150, 65 145" fill="none" stroke="#6b4a4a" stroke-width="4" stroke-linecap="round"/>
  <path d="M 135 145 Q 150 150, 160 140" fill="none" stroke="#6b4a4a" stroke-width="4" stroke-linecap="round"/>
  
  <!-- "Hilltop" script text -->
  <text x="100" y="85" font-family="Brush Script MT, cursive, serif" font-size="42" fill="#6b4a4a" text-anchor="middle" font-weight="bold" font-style="italic">Hilltop</text>
  
  <!-- "SMOKE" smaller text -->
  <text x="100" y="105" font-family="Arial, sans-serif" font-size="14" fill="#6b4a4a" text-anchor="middle" font-weight="bold" letter-spacing="2">SMOKE</text>
  
  <!-- "SHOP" bold text -->
  <text x="100" y="135" font-family="Arial Black, sans-serif" font-size="38" fill="#6b4a4a" text-anchor="middle" font-weight="900" letter-spacing="1">SHOP</text>
</svg>